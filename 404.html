<!DOCTYPE html>
<html lang="en">
<head>

<title>Portfolio</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Overpass&display=swap');

* {
  box-sizing: border-box;
}

header {
  font-family: 'Overpass', sans-serif;
  text-align: center;
  font-size: 30px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  margin: 0;
}

body {
  font-family: 'Overpass', sans-serif;
  margin: 10px;
  text-align: center;
}
a {
  text-decoration: none;
  color: #ffd310;
  transition: 0.3s ease-out;
  background: none;
  border-bottom: 2px solid #ffd310;
}
a:hover {
  color: #ffe988;
  border-bottom: 2px solid #ffe988;
  background: none;
}
</style>
</head>

<header>
  404 - Page not found. <a href="https://zilibobi.github.io">Return</a> to home?
</header>

<script>
function setColor(elmId, clr) {
  var elem = document.getElementById(elmId);
  elem.style.color = clr
}

function setBColor(elmId, clr) {
  var elem = document.getElementById(elmId) ;
  elem.style.backgroundColor = clr
}

(function() {
  if (localStorage.getItem("mode") === "dark") {
    document.body.style.backgroundColor = "#262736";
    document.body.style.color = "#fff";
  } else {
    document.body.style.backgroundColor = "#fff";
    document.body.style.color = "#000";
  }
})();
</script>
</html>
